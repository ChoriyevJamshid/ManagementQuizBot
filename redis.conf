# ─── PERSISTENCE ─────────────────────────────────────────────────────────────

# AOF: write every command to disk — survives Redis restart
appendonly yes
appendfilename "appendonly.aof"

# fsync every second: best balance between safety and performance.
# everysec = at most 1 second of data lost on crash.
appendfsync everysec

# Don't fsync during AOF rewrite (avoids latency spikes)
no-appendfsync-on-rewrite yes

# Trigger AOF rewrite when file grows 100% from last rewrite
auto-aof-rewrite-percentage 100
# But only if AOF file is at least 64MB
auto-aof-rewrite-min-size 64mb

# RDB snapshot as backup (every 15 min if at least 1 key changed)
save 900 1
save 300 10

# ─── MEMORY ──────────────────────────────────────────────────────────────────

# Evict least-recently-used keys when memory is full
maxmemory-policy allkeys-lru

# ─── NETWORK ─────────────────────────────────────────────────────────────────

# Allow connections from all interfaces (Docker network)
bind 0.0.0.0
protected-mode no
